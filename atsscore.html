<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Score Optimizer | resume.studio</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF.js for PDF parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.4.2/mammoth.browser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F9F7F5 0%, #F0EFED 100%);
            padding: 2rem;
            min-height: 100vh;
        }

        .module-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Module Card Styles - resume.studio theme */
        .ats-module-card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(58, 77, 140, 0.08);
            border: 1px solid #EDF0F3;
            transition: all 0.3s ease;
        }

        .ats-module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(58, 77, 140, 0.12);
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #EDF0F3;
        }

        .module-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #E9EEFF 0%, #E2F0EC 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #3A4D8C;
            transition: all 0.3s;
        }

        .ats-module-card:hover .module-icon {
            transform: scale(1.05);
        }

        .module-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2C3A4B;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .module-subtitle {
            color: #5D6E7F;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        /* Real-time indicator */
        .real-time-badge {
            background: #E2F0EC;
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #4A8B7A;
            margin-bottom: 1rem;
        }

        .real-time-badge i {
            font-size: 0.6rem;
        }

        /* File Upload Area */
        .file-upload-area {
            border: 2px dashed #E2E6EA;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #F9F7F5;
            margin-bottom: 1.5rem;
        }

        .file-upload-area:hover {
            border-color: #3A4D8C;
            background: #E9EEFF;
            transform: translateY(-2px);
        }

        .file-upload-area i {
            font-size: 2.5rem;
            color: #3A4D8C;
            margin-bottom: 0.5rem;
        }

        .file-upload-area p {
            color: #5D6E7F;
            font-size: 0.85rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2C3A4B;
            margin-bottom: 0.5rem;
        }

        textarea, input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #EDF0F3;
            border-radius: 16px;
            font-family: 'Inter', monospace;
            font-size: 0.9rem;
            transition: all 0.3s;
            background: #FFFFFF;
        }

        textarea {
            resize: vertical;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #3A4D8C;
            box-shadow: 0 0 0 3px rgba(58, 77, 140, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3A4D8C 0%, #4A8B7A 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(58, 77, 140, 0.3);
        }

        /* Score Container */
        .score-container {
            background: linear-gradient(135deg, #F9F7F5 0%, #F0EFED 100%);
            border-radius: 24px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            text-align: center;
        }

        .big-score {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0.5rem 0;
        }

        .progress-bar-bg {
            background: #EDF0F3;
            border-radius: 40px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #3A4D8C, #4A8B7A);
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.8s ease;
        }

        .keyword-section {
            margin: 1rem 0;
        }

        .keyword-badge {
            background: #EDF0F3;
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            margin: 0.25rem;
            color: #2C3A4B;
            font-weight: 500;
            transition: all 0.2s;
        }

        .matched-badge {
            background: #E2F0EC;
            color: #4A8B7A;
        }

        .missing-badge {
            background: #F7E6DE;
            color: #C47A5D;
        }

        .tips-list {
            margin-top: 1rem;
            list-style: none;
        }

        .tips-list li {
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: #5D6E7F;
            padding: 0.5rem;
            background: #F9F7F5;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .tips-list li:hover {
            background: #E9EEFF;
            transform: translateX(5px);
        }

        .tips-list li i {
            color: #3A4D8C;
            width: 20px;
        }

        .warning-text {
            text-align: center;
            color: #8C9AA8;
            font-size: 0.85rem;
            margin-top: 1rem;
            padding: 1rem;
            background: #F9F7F5;
            border-radius: 12px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #EDF0F3;
            border-top-color: #3A4D8C;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        hr {
            margin: 1rem 0;
            border: 0;
            height: 1px;
            background: #EDF0F3;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .module-title {
                font-size: 1.4rem;
            }
            .big-score {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="module-container">
        <div class="ats-module-card">
            <div class="module-header">
                <div class="module-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div>
                    <div class="module-title">ATS Score Optimizer</div>
                    <div class="module-subtitle">Real-time analysis for Applicant Tracking Systems</div>
                </div>
            </div>

            <!-- Real-time indicator -->
            <div class="real-time-badge">
                <i class="fas fa-sync-alt"></i>
                <span>Real-time scoring active</span>
            </div>

            <!-- Resume Upload Area -->
            <div class="file-upload-area" id="resumeUploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Upload Resume (PDF, DOCX, TXT)</p>
                <input type="file" id="resumeFileInput" accept=".pdf,.docx,.txt" style="display: none;">
            </div>

            <div class="form-group">
                <label><i class="fas fa-file-alt"></i> Resume Text</label>
                <textarea id="resumeText" rows="5" placeholder="Paste your resume text here... (Real-time ATS score updates as you type)"></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-briefcase"></i> Job Description (Optional but Recommended)</label>
                <textarea id="jobDesc" rows="4" placeholder="Paste the job description here for keyword matching... (Real-time analysis updates)"></textarea>
            </div>

            <button class="btn-primary" id="checkAtsBtn">
                <i class="fas fa-chart-simple"></i> Analyze ATS Score
            </button>

            <div id="resultsContainer">
                <div class="warning-text">
                    <i class="fas fa-info-circle"></i> Upload or paste your resume for real-time ATS analysis
                </div>
            </div>
        </div>
    </div>

    <script>
        // File parsing functions
        function parsePDF(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const typedarray = new Uint8Array(e.target.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    let fullText = '';
                    let pages = [];
                    for (let i = 1; i <= pdf.numPages; i++) {
                        pages.push(pdf.getPage(i));
                    }
                    Promise.all(pages).then(function(pages) {
                        let textPromises = pages.map(page => page.getTextContent());
                        Promise.all(textPromises).then(function(textContents) {
                            textContents.forEach(textContent => {
                                textContent.items.forEach(item => {
                                    fullText += item.str + ' ';
                                });
                            });
                            callback(fullText);
                        });
                    });
                }).catch(function(error) {
                    callback('Error parsing PDF: ' + error.message);
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function parseDOCX(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                    .then(function(result) {
                        callback(result.value);
                    })
                    .catch(function(error) {
                        callback('Error parsing DOCX: ' + error.message);
                    });
            };
            reader.readAsArrayBuffer(file);
        }

        function parseTXT(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                callback(e.target.result);
            };
            reader.readAsText(file);
        }

        // Handle resume file upload
        const resumeUploadArea = document.getElementById('resumeUploadArea');
        const resumeFileInput = document.getElementById('resumeFileInput');
        const resumeText = document.getElementById('resumeText');
        const jobDesc = document.getElementById('jobDesc');
        const resultsContainer = document.getElementById('resultsContainer');
        let realtimeTimeout;

        resumeUploadArea.addEventListener('click', () => resumeFileInput.click());
        
        resumeFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                const fileExtension = file.name.split('.').pop().toLowerCase();
                
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'warning-text';
                loadingDiv.innerHTML = '<span class="loading"></span> Processing resume...';
                resumeUploadArea.parentNode.insertBefore(loadingDiv, resumeUploadArea.nextSibling);

                if (fileExtension === 'pdf') {
                    parsePDF(file, (text) => {
                        resumeText.value = text;
                        loadingDiv.remove();
                        showSuccessMessage('Resume uploaded successfully!', resumeUploadArea);
                        triggerRealtimeAnalysis();
                    });
                } else if (fileExtension === 'docx') {
                    parseDOCX(file, (text) => {
                        resumeText.value = text;
                        loadingDiv.remove();
                        showSuccessMessage('Resume uploaded successfully!', resumeUploadArea);
                        triggerRealtimeAnalysis();
                    });
                } else if (fileExtension === 'txt') {
                    parseTXT(file, (text) => {
                        resumeText.value = text;
                        loadingDiv.remove();
                        showSuccessMessage('Resume uploaded successfully!', resumeUploadArea);
                        triggerRealtimeAnalysis();
                    });
                } else {
                    loadingDiv.remove();
                    alert('Unsupported file format. Please upload PDF, DOCX, or TXT files.');
                }
            }
        });

        // Drag and drop for resume
        resumeUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            resumeUploadArea.style.borderColor = '#3A4D8C';
            resumeUploadArea.style.background = '#E9EEFF';
        });
        
        resumeUploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            resumeUploadArea.style.borderColor = '#E2E6EA';
            resumeUploadArea.style.background = '#F9F7F5';
        });
        
        resumeUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            resumeUploadArea.style.borderColor = '#E2E6EA';
            resumeUploadArea.style.background = '#F9F7F5';
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                const fileExtension = file.name.split('.').pop().toLowerCase();
                
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'warning-text';
                loadingDiv.innerHTML = '<span class="loading"></span> Processing resume...';
                resumeUploadArea.parentNode.insertBefore(loadingDiv, resumeUploadArea.nextSibling);

                if (fileExtension === 'pdf') {
                    parsePDF(file, (text) => {
                        resumeText.value = text;
                        loadingDiv.remove();
                        showSuccessMessage('Resume uploaded successfully!', resumeUploadArea);
                        triggerRealtimeAnalysis();
                    });
                } else if (fileExtension === 'docx') {
                    parseDOCX(file, (text) => {
                        resumeText.value = text;
                        loadingDiv.remove();
                        showSuccessMessage('Resume uploaded successfully!', resumeUploadArea);
                        triggerRealtimeAnalysis();
                    });
                } else if (fileExtension === 'txt') {
                    parseTXT(file, (text) => {
                        resumeText.value = text;
                        loadingDiv.remove();
                        showSuccessMessage('Resume uploaded successfully!', resumeUploadArea);
                        triggerRealtimeAnalysis();
                    });
                } else {
                    loadingDiv.remove();
                    alert('Unsupported file format. Please upload PDF, DOCX, or TXT files.');
                }
            }
        });

        function showSuccessMessage(message, element) {
            const successDiv = document.createElement('div');
            successDiv.className = 'warning-text';
            successDiv.style.color = '#4A8B7A';
            successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            element.parentNode.insertBefore(successDiv, element.nextSibling);
            setTimeout(() => successDiv.remove(), 3000);
        }

        // ATS Score Calculation
        function extractKeywords(text) {
            if (!text.trim()) return [];
            const words = text.toLowerCase().split(/[\s,;:()\-\.\n\/]+/);
            const stopWords = new Set(['the','a','an','and','or','for','in','on','with','at','by','from','of','to','is','are','was','were','be','have','has','had','we','i','you','they','their','this','that']);
            const freq = new Map();
            words.forEach(word => {
                if (word.length > 2 && !stopWords.has(word) && /[a-z]/i.test(word)) {
                    freq.set(word, (freq.get(word) || 0) + 1);
                }
            });
            let sorted = Array.from(freq.entries()).sort((a, b) => b[1] - a[1]);
            return sorted.slice(0, 25).map(item => item[0]);
        }

        function calculateATSScore(resumeText, jobDescText) {
            if (!resumeText.trim()) {
                return { score: 0, matchPercent: 0, matchedKeywords: [], missingKeywords: [], tips: [] };
            }

            // Structure bonus
            let structureBonus = 30;
            if (/(summary|profile)/i.test(resumeText)) structureBonus += 8;
            if (/(experience|work history|employment)/i.test(resumeText)) structureBonus += 12;
            if (/(education|degree|university|college)/i.test(resumeText)) structureBonus += 8;
            if (/(skills|technologies|competencies)/i.test(resumeText)) structureBonus += 12;
            if (/(email|@|phone|mobile)/i.test(resumeText)) structureBonus += 5;
            if (/\d+%|\$\d+|\d+\s*percent/i.test(resumeText)) structureBonus += 10;

            if (!jobDescText.trim()) {
                let estScore = Math.min(85, structureBonus);
                return {
                    score: estScore,
                    matchPercent: 0,
                    matchedKeywords: [],
                    missingKeywords: [],
                    tips: [
                        "📋 Add a job description for accurate keyword matching (recommended)",
                        "✅ Use standard section headers: Summary, Experience, Education, Skills",
                        "📄 Save your resume as PDF or Word for best ATS compatibility",
                        "🎯 Include measurable achievements with numbers and percentages"
                    ]
                };
            }

            const jdKeywords = extractKeywords(jobDescText);
            if (jdKeywords.length === 0) {
                return {
                    score: 50,
                    matchPercent: 0,
                    matchedKeywords: [],
                    missingKeywords: [],
                    tips: ["Paste a more detailed job description with specific skills and keywords for better analysis."]
                };
            }

            const resumeLower = resumeText.toLowerCase();
            const matched = [];
            const missing = [];
            
            jdKeywords.forEach(keyword => {
                if (resumeLower.includes(keyword)) {
                    matched.push(keyword);
                } else {
                    missing.push(keyword);
                }
            });
            
            const matchPercent = Math.round((matched.length / jdKeywords.length) * 100);
            let baseScore = Math.min(70, Math.floor((matched.length / jdKeywords.length) * 70));
            let finalScore = Math.min(100, baseScore + structureBonus);
            
            let tips = [];
            if (missing.length > 0) {
                tips.push(`🔑 Add these top missing keywords: ${missing.slice(0, 8).join(', ')}${missing.length > 8 ? '...' : ''}`);
            }
            if (matched.length > 0) {
                tips.push(`✅ Found ${matched.length} out of ${jdKeywords.length} keywords (${matchPercent}% match)`);
            }
            if (structureBonus < 50) {
                tips.push("📌 Improve resume structure: Add clear sections like 'Summary', 'Experience', 'Skills', 'Education'");
            }
            if (matchPercent < 30) {
                tips.push("⚡ Customize your resume with more job-specific terminology from the job description");
            } else if (matchPercent < 60) {
                tips.push("📈 Good match, but you can improve by incorporating more keywords");
            }
            if (finalScore > 85) {
                tips.push("🎉 Excellent! Your resume is well-optimized for ATS systems");
            } else if (finalScore > 65) {
                tips.push("💪 Solid score! Fine-tune by adding missing keywords");
            } else {
                tips.push("🔄 Revise your resume: Mirror the job description language and include measurable achievements");
            }
            tips.push("📄 Use a clean, single-column layout and avoid tables, graphics, or complex formatting");
            
            return { score: finalScore, matchPercent, matchedKeywords: matched.slice(0, 12), missingKeywords: missing.slice(0, 12), tips };
        }

        function renderResults() {
            const resume = resumeText.value;
            const jobDescText = jobDesc.value;
            
            if (!resume.trim()) {
                resultsContainer.innerHTML = `
                    <div class="warning-text">
                        <i class="fas fa-exclamation-triangle"></i> Please upload or paste your resume text for ATS analysis
                    </div>
                `;
                return;
            }
            
            const { score, matchPercent, matchedKeywords, missingKeywords, tips } = calculateATSScore(resume, jobDescText);
            
            let scoreColor = '#C47A5D';
            if (score >= 80) scoreColor = '#4A8B7A';
            else if (score >= 60) scoreColor = '#3A4D8C';
            
            let matchedHtml = '';
            if (matchedKeywords.length > 0 && jobDescText.trim()) {
                matchedHtml = `
                    <div class="keyword-section">
                        <strong>✅ Keywords Found (${matchedKeywords.length})</strong><br>
                        ${matchedKeywords.map(kw => `<span class="keyword-badge matched-badge"><i class="fas fa-check"></i> ${kw}</span>`).join('')}
                    </div>
                `;
            }
            
            let missingHtml = '';
            if (missingKeywords.length > 0 && jobDescText.trim()) {
                missingHtml = `
                    <div class="keyword-section">
                        <strong>🔑 Missing Keywords (${missingKeywords.length})</strong><br>
                        ${missingKeywords.map(kw => `<span class="keyword-badge missing-badge"><i class="fas fa-times"></i> ${kw}</span>`).join('')}
                    </div>
                `;
            }
            
            let tipsHtml = `<ul class="tips-list">`;
            tips.forEach(t => {
                tipsHtml += `<li><i class="fas fa-arrow-right"></i> ${t}</li>`;
            });
            tipsHtml += `</ul>`;
            
            const resultsHtml = `
                <div class="score-container">
                    <div class="flex-between">
                        <span><strong>ATS Score</strong></span>
                        ${jobDescText.trim() ? `<span><strong>Keyword Match: ${matchPercent}%</strong></span>` : '<span><strong>Structure Analysis Only</strong></span>'}
                    </div>
                    <div class="big-score" style="color: ${scoreColor};">${score}<span style="font-size: 1.2rem;">/100</span></div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill" style="width: ${score}%;"></div>
                    </div>
                    <div style="font-size: 0.75rem; margin-top: 0.5rem;">
                        Based on keyword relevance + resume structure
                    </div>
                </div>
                ${matchedHtml}
                ${missingHtml}
                <div><i class="fas fa-clipboard-list"></i> <strong>Optimization Tips</strong></div>
                ${tipsHtml}
                <hr>
                <div class="warning-text">
                    <i class="fas fa-print"></i> Tip: Use standard fonts (Arial, Calibri) and avoid headers/footers for best ATS parsing
                </div>
            `;
            
            resultsContainer.innerHTML = resultsHtml;
        }

        // Real-time analysis function
        function triggerRealtimeAnalysis() {
            if (realtimeTimeout) clearTimeout(realtimeTimeout);
            
            if (resumeText.value.trim()) {
                resultsContainer.innerHTML = `
                    <div class="score-container">
                        <div class="flex-between">
                            <span><strong>ATS Score</strong></span>
                            ${jobDesc.value.trim() ? '<span><strong>Analyzing...</strong></span>' : '<span><strong>Structure Analysis</strong></span>'}
                        </div>
                        <div class="big-score" style="color: #3A4D8C;">
                            <span class="loading"></span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-fill" style="width: 0%;"></div>
                        </div>
                    </div>
                `;
                
                realtimeTimeout = setTimeout(() => {
                    renderResults();
                }, 500);
            } else {
                resultsContainer.innerHTML = `
                    <div class="warning-text">
                        <i class="fas fa-info-circle"></i> Start typing or upload a resume to see real-time ATS analysis
                    </div>
                `;
            }
        }

        // Real-time input event listeners
        resumeText.addEventListener('input', () => {
            triggerRealtimeAnalysis();
        });

        jobDesc.addEventListener('input', () => {
            if (resumeText.value.trim()) {
                triggerRealtimeAnalysis();
            }
        });

        // Manual button click
        const checkAtsBtn = document.getElementById('checkAtsBtn');
        checkAtsBtn.addEventListener('click', () => {
            if (!resumeText.value.trim()) {
                resultsContainer.innerHTML = `
                    <div class="warning-text">
                        <i class="fas fa-exclamation-triangle"></i> Please upload or paste your resume first
                    </div>
                `;
                return;
            }
            
            renderResults();
